<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Booster - Side Balance System</title>
    <style>
        /* Aapka existing CSS (Maine look wahi rakha hai) */
        body { font-family: sans-serif; background-color: #0f0f0f; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        
        /* Main Submit Button */
        .btn-main { width: 100%; padding: 12px; background: #ff4500; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* History & Balance Side-by-Side */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-history { flex: 1; padding: 10px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-balance { flex: 1; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        /* Modal Style */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; }
        .modal-content { margin: 30% auto; padding: 20px; background: #1a1a1a; width: 80%; max-width: 320px; border-radius: 10px; border: 1px solid #28a745; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Like Booster</h2>
    
    <input type="number" id="uid" placeholder="Enter Free Fire UID">
    <select id="region">
        <option value="ind">India (IND)</option>
        <option value="sg">Singapore</option>
    </select>

    <button class="btn-main" onclick="buyLikes()">SUBMIT ORDER (10 Coins)</button>

    <div class="btn-group">
        <button type="button" class="btn-history">History</button>
        <button type="button" class="btn-balance" onclick="toggleBalanceModal()">
            💰 Bal: <span id="display-balance">0</span>
        </button>
    </div>
</div>

<div id="balance-modal" class="modal">
    <div class="modal-content">
        <h3 style="color: #28a745; margin-top: 0;">Add Balance</h3>
        <input type="number" id="add-amount" placeholder="Amount to add">
        <input type="text" id="redeem-code" placeholder="Redeem Code">
        
        <div style="margin-top: 15px;">
            <button onclick="submitToAdmin()" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Submit</button>
            <button onclick="toggleBalanceModal()" style="padding: 10px 20px; background: #444; color: white; border: none; border-radius: 5px; margin-left: 5px;">Close</button>
        </div>
    </div>
</div>

<script>
    // --- 1. SYSTEM INITIALIZATION ---
    let userBalance = localStorage.getItem('user_balance') ? parseInt(localStorage.getItem('user_balance')) : 0;
    const likeCost = 10; // 1 order = 10 coins

    // Screen load hote hi balance update karein
    document.getElementById('display-balance').innerText = userBalance;

    function toggleBalanceModal() {
        var m = document.getElementById('balance-modal');
        m.style.display = (m.style.display == 'none') ? 'block' : 'none';
    }

    // --- 2. REDEEM REQUEST (Sent to Admin) ---
    function submitToAdmin() {
        let amt = document.getElementById('add-amount').value;
        let cod = document.getElementById('redeem-code').value;

        if(!amt || !cod) {
            alert("Please fill all details!");
            return;
        }

        // Notification for Admin (Visible in Console)
        console.log("NEW APPROVAL REQUEST: Amount " + amt + " | Code: " + cod);
        
        alert("Request Sent! Admin approve hote hi balance badh jayega.");
        toggleBalanceModal();
        
        // Clear inputs
        document.getElementById('add-amount').value = '';
        document.getElementById('redeem-code').value = '';
    }

    // --- 3. BUY LIKES LOGIC (With Balance Check) ---
    function buyLikes() {
        let uid = document.getElementById('uid').value;
        let reg = document.getElementById('region').value;

        if(!uid) {
            alert("Pehle UID daalein!");
            return;
        }

        // Check if user has enough coins
        if(userBalance < likeCost) {
            alert("❌ Insufficient Balance! Please add balance first.");
            toggleBalanceModal(); // Direct recharge pe le jao
            return;
        }

        // Agar balance hai toh API Call
        const apiUrl = `https://pnx-like-rosy.vercel.app/like?uid=${uid}&region=${reg}&key=UDIT`;

        fetch(apiUrl)
        .then(res => {
            // Success hone par balance kaato
            userBalance -= likeCost;
            saveBalance();
            alert("✅ Order Successful! 10 Coins deducted.");
        })
        .catch(err => {
            alert("API Error! Please try again later.");
        });
    }

    // --- 4. BALANCE UPDATER ---
    function saveBalance() {
        localStorage.setItem('user_balance', userBalance);
        document.getElementById('display-balance').innerText = userBalance;
    }

    // --- 5. ADMIN APPROVAL (Console command) ---
    // Browser console me likhein: adminApprove(100)
    function adminApprove(n) {
        userBalance += parseInt(n);
        saveBalance();
        alert("Balance Approved: " + n + " Coins added!");
    }
</script>

</body>
</html>
