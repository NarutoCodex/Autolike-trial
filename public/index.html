<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like Booster - Naruto Codex</title>
    <style>
        :root {
            --primary-color: #28a745;
            --secondary-color: #ff4500;
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }

        h2 { color: var(--primary-color); margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit { background-color: var(--secondary-color); color: white; font-size: 16px; }
        .btn-submit:hover { opacity: 0.8; transform: scale(1.02); }

        .btn-history { background-color: #444; color: white; }

        .btn-balance { 
            background-color: var(--primary-color); 
            color: white; 
            border: 2px solid transparent;
        }

        /* Modal Style */
        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
        }

        .modal-content {
            background-color: var(--card-bg);
            margin: 20% auto;
            padding: 25px;
            border: 1px solid var(--primary-color);
            width: 80%;
            max-width: 350px;
            border-radius: 15px;
            box-shadow: 0 0 20px var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Like Booster</h2>
    
    <input type="number" id="uid" placeholder="Enter Free Fire UID">
    
    <select id="region" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: #000; color: #fff;">
        <option value="ind">India (IND)</option>
        <option value="sg">Singapore</option>
        <option value="br">Brazil</option>
    </select>

    <button class="btn-submit" onclick="processLikeRequest()">SUBMIT ORDER (10 Coins)</button>
    
    <button class="btn-history">History</button>

    <button class="btn-balance" onclick="toggleBalanceModal()">
        💰 Balance: <span id="display-balance">0</span> Coins
    </button>
</div>

<div id="balance-modal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--primary-color);">Top Up Balance</h3>
        <input type="number" id="add-amount" placeholder="Enter Coins Amount">
        <input type="text" id="redeem-code" placeholder="Enter Secret Redeem Code">
        
        <button onclick="submitToAdmin()" style="background: var(--primary-color); color: white;">Submit to Admin</button>
        <button onclick="toggleBalanceModal()" style="background: #444; color: white;">Cancel</button>
    </div>
</div>

<script>
    // 1. Initial State & Persistence
    let userBalance = localStorage.getItem('user_balance') ? parseInt(localStorage.getItem('user_balance')) : 0; 
    const likeCost = 10; 

    // Update Display on Load
    document.getElementById('display-balance').innerText = userBalance;

    function toggleBalanceModal() {
        const modal = document.getElementById('balance-modal');
        modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    }

    // 2. Submit Redeem Request
    function submitToAdmin() {
        const amount = document.getElementById('add-amount').value;
        const code = document.getElementById('redeem-code').value;

        if (!amount || !code) {
            alert("Please fill all details!");
            return;
        }

        // Notification for Admin (Visible in Console for now)
        console.log(`[ADMIN NOTIFY] User Requesting: ${amount} Coins, Code: ${code}`);
        
        alert("Request Sent! Admin approve karte hi coins add ho jayenge.");
        toggleBalanceModal();
        
        // Inputs clear karein
        document.getElementById('add-amount').value = '';
        document.getElementById('redeem-code').value = '';
    }

    // 3. Process Like (Deducts Balance)
    function processLikeRequest() {
        const uidValue = document.getElementById('uid').value;
        const regionValue = document.getElementById('region').value;

        if (!uidValue) {
            alert("❌ Please enter UID first!");
            return;
        }

        // Check if user has enough balance
        if (userBalance < likeCost) {
            alert("❌ Insufficient Balance! Please add coins to buy likes.");
            toggleBalanceModal(); // Automatically open recharge menu
            return;
        }

        // If balance is okay, call the API
        const apiUrl = `https://pnx-like-rosy.vercel.app/like?uid=${uidValue}&region=${regionValue}&key=UDIT`;

        // UI Feedback
        const btn = document.querySelector('.btn-submit');
        btn.innerText = "Processing...";
        btn.disabled = true;

        fetch(apiUrl)
            .then(res => {
                // Success: Deduct balance
                userBalance -= likeCost;
                saveAndRefreshBalance();
                alert("✅ Success! Likes sent and 10 coins deducted.");
            })
            .catch(err => {
                alert("⚠️ Connection Error! API is not responding.");
            })
            .finally(() => {
                btn.innerText = "SUBMIT ORDER (10 Coins)";
                btn.disabled = false;
            });
    }

    // 4. Admin Function (Call this via console or admin panel to add money)
    function adminApprove(amountToAdd) {
        userBalance += parseInt(amountToAdd);
        saveAndRefreshBalance();
        alert("Admin Approved: " + amountToAdd + " Coins added!");
    }

    function saveAndRefreshBalance() {
        localStorage.setItem('user_balance', userBalance);
        document.getElementById('display-balance').innerText = userBalance;
    }
</script>

</body>
</html>
